<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투썸 플레이스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔝 헤더 -->
<header class="TWOSOME-header">
  <div class="menu-icon">☰</div>
  <div class="logo">A TWOSOME PLACE</div>
</header>

<div class="header-space"></div>

<!-- 배너 -->
<div class="banner">
  <img src="Tosomeplacesandwich.PNG" class="banner-img">
</div>

<!-- 🔐 로그인 -->
<div class="login-box">
  <span class="red">투썸하트 앱</span><br>
  <strong>회원가입 / 로그인 하기 ›</strong>
</div>

<!-- 🛍️ 상품 영역 -->
<section class="section">

  <div class="section-top">
    <h2>투썸을 선물하세요! 더보기 ›</h2>
  </div>

  <!-- 카테고리 -->
  <div class="category">
    <span class="active">전체</span>
    <span>1만원미만</span>
    <span>1만원대</span>
    <span>2만원대</span>
    <span>3만원이상</span>
  </div>

  <!-- 상품 리스트 -->
  <div class="products">

    <div class="item">
      <img src="twosomeplace4.PNG">
      <h1>가장 많이 주문한 홀 캐이크예요!</h1><strong></strong>
    </div>

    <div class="item">
      <img src="twosomeplace5.PNG">
      <h2>새로 나왔어요!</h2><strong></strong>
    </div>

    <div class="item">
      <img src="twosomeplace6.PNG">
      <p>인기 디저트</p>
      <strong>마카롱 세트</strong>
    </div>

  </div>

</section>

<!-- 🔻 하단 메뉴 -->
<nav class="bottom-nav">
  <div class="nav-item">주문내역</div>
  <div class="nav-item">투썸오더</div>
  <div class="nav-item">케이크예약</div>
  <div class="nav-item">선물하기</div>
  <div class="nav-item">이벤트</div>
</nav>

</body>
</html>
