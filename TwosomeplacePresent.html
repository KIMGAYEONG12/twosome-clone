<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>투썸 플레이스 선물하기</title>
    <link rel="stylesheet" href="TwosomePresent.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <div class="header-left"><span>⊞ 🏠</span></div>
        <div class="header-title">선물하기</div>
        <div class="header-right">
          <span class="icon">🔍</span>
          <span class="icon-space"></span>
          <span class="icon">🛒</span>
        </div>
      </header>

      <main class="main">
        <section class="banner">
          <div class="banner-slide">
            <img
              src="20260416THU.PNG"
              alt="선물하기 페이지 배너"
              class="img-content"
            />
          </div>
        </section>

        <section class="product-section">
          <div class="section-header">
            <span class="title">투썸을 선물하세요!</span>
            <span class="more-btn">더보기 ></span>
          </div>

          <nav class="category">
            <span class="active">전체</span>
            <span>1만원미만</span>
            <span>1만원대</span>
            <span>2만원대</span>
            <span>3만원 이상</span>
          </nav>

          <div class="square-grid">
            <div class="product-item">
              <div class="img-box">
                <img src="1.PNG" alt="스초생" class="product-img" />
              </div>
              <div class="info-box">
                <p class="product-name">스초생®</p>
                <p class="product-price">39,000원</p>
              </div>
            </div>

            <div class="product-item">
              <div class="img-box">
                <img src="2.PNG" alt="5만원권" class="product-img" />
              </div>
              <div class="info-box">
                <p class="product-name">5만원권</p>
                <p class="product-price">50,000원</p>
              </div>
            </div>

            <div class="product-item">
              <div class="img-box">
                <img src="3.PNG" alt="1만원권" class="product-img" />
              </div>
              <div class="info-box">
                <p class="product-name">1만원권</p>
                <p class="product-price">10,000원</p>
              </div>
            </div>

            <div class="product-item">
              <div class="img-box">
                <img src="5.PNG" alt="3만원권" class="product-img" />
              </div>
              <div class="info-box">
                <p class="product-name">3만원권</p>
                <p class="product-price">30,000원</p>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
